<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS-LOOKUP REST API 测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #1890ff;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: #888;
    }
    
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #0d0d1a;
      color: #e0e0e0;
      font-size: 14px;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    
    button:hover {
      background: #40a9ff;
    }
    
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
    }
    
    .status.loading {
      background: #2d2d44;
      color: #1890ff;
    }
    
    .status.error {
      background: #442d2d;
      color: #ff4d4f;
    }
    
    .status.success {
      background: #2d4436;
      color: #52c41a;
    }
    
    .player-info {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }
    
    .player-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #1890ff;
    }
    
    .player-details h2 {
      margin-bottom: 5px;
    }
    
    .player-details p {
      color: #888;
      font-size: 14px;
    }
    
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    
    .item-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      position: relative;
    }
    
    .item-count {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .item-image {
      width: 100%;
      height: 100px;
      object-fit: contain;
      margin-bottom: 8px;
    }
    
    .item-name {
      font-size: 12px;
      color: #ccc;
      word-break: break-word;
    }
    
    .total-count {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
      color: #1890ff;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
    <div class="container">
      <h1>🎮 CS-LOOKUP REST API 测试</h1>

      <div class="form-group">
        <label>API 地址</label>
        <input type="text" id="apiBase" value="http://127.0.0.1:60730" placeholder="http://127.0.0.1:60730">
      </div>

      <div class="form-group">
        <label>Steam ID</label>
        <input type="text" id="steamid" placeholder="输入 Steam ID (纯数字)">
    </div>
    
    <div class="form-group">
      <label>Token</label>
      <input type="text" id="token" value="please-change-token" placeholder="please-change-token">
...
      <input type="text" id="secret" value="please-change-secret" placeholder="please-change-secret">
    </div>
    
    <button id="queryBtn" onclick="queryInventory()">查询库存</button>
    
    <div id="status" class="status hidden"></div>
    
    <div id="result" class="hidden">
      <div class="player-info">
        <img id="playerAvatar" class="player-avatar" src="" alt="Avatar">
        <div class="player-details">
          <h2 id="playerName"></h2>
          <p id="playerSteamId"></p>
        </div>
      </div>
      
      <div id="totalCount" class="total-count"></div>
      
      <div id="itemsGrid" class="items-grid"></div>
    </div>
  </div>

  <script>
    
    function getApiBase() {
      return document.getElementById('apiBase').value.trim() || 'http://127.0.0.1:60730';
    }

    async function queryInventory() {
      const steamid = document.getElementById('steamid').value.trim();
      const token = document.getElementById('token').value.trim();
      const secret = document.getElementById('secret').value.trim();
      
      if (!steamid || !token || !secret) {
        showStatus('error', '请填写所有必填字段');
        return;
      }
      
      if (!/^\d+$/.test(steamid)) {
        showStatus('error', 'Steam ID 必须是纯数字');
        return;
      }
      
      const btn = document.getElementById('queryBtn');
      btn.disabled = true;
      btn.textContent = '查询中...';
      
      showStatus('loading', '正在查询库存...');
      document.getElementById('result').classList.add('hidden');
      
      try {
        const response = await fetch(`${getApiBase()}/cs-inv?steamid=${steamid}&token=${encodeURIComponent(token)}`, {
          headers: {
            'X-Secret': secret
          }
        });
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.error || '查询失败');
        }
        
        // 调试信息：查看数据结构
        console.log('API 返回数据:', data);
        if (data.data && data.data.descriptions && data.data.descriptions.length > 0) {
          console.log('第一个饰品数据:', data.data.descriptions[0]);
        }
        
        showStatus('success', '查询成功');
        displayResult(data);
        
      } catch (error) {
        showStatus('error', `查询失败: ${error.message}`);
        console.error('查询错误:', error);
      } finally {
        btn.disabled = false;
        btn.textContent = '查询库存';
      }
    }
    
    function showStatus(type, message) {
      const status = document.getElementById('status');
      status.className = `status ${type}`;
      status.textContent = message;
      status.classList.remove('hidden');
    }
    
    function displayResult(data) {
      const result = document.getElementById('result');
      result.classList.remove('hidden');
      
      // 获取 token 和 secret
      const token = document.getElementById('token').value.trim();
      const secret = document.getElementById('secret').value.trim();
      
      // 显示玩家信息
      const player = data.metadata.player;
      document.getElementById('playerName').textContent = player.name;
      document.getElementById('playerSteamId').textContent = `Steam ID: ${data.metadata.steamid}`;
      
      // 加载玩家头像
      const avatarUrl = player.avatar;
      if (avatarUrl) {
        loadPlayerAvatar(avatarUrl, token, secret);
      }
      
      // 显示库存
      const inventory = data.data;
      
      if (!inventory.descriptions || inventory.descriptions.length === 0) {
        document.getElementById('totalCount').textContent = '📦 该用户没有CS2库存';
        document.getElementById('itemsGrid').innerHTML = '';
        return;
      }
      
      document.getElementById('totalCount').textContent = `📦 总物品数: ${inventory.total_inventory_count}`;
      
      // 统计物品数量
      const itemCounts = {};
      const itemInfo = {};
      
      for (const item of inventory.descriptions) {
        // 优先使用 name 字段（可能是中文），如果不存在则使用 market_name（通常是英文）
        const name = item.name || item.market_name;
        if (!itemCounts[name]) {
          itemCounts[name] = 0;
          itemInfo[name] = {
            icon_url: item.icon_url,
            classid: item.classid,
            instanceid: item.instanceid || '0'
          };
        }
        itemCounts[name]++;
      }
      
      // 渲染物品
      const grid = document.getElementById('itemsGrid');
      grid.innerHTML = '';
      
      for (const [name, count] of Object.entries(itemCounts)) {
        const info = itemInfo[name];
        const card = document.createElement('div');
        card.className = 'item-card';
        
        const countBadge = count > 1 ? `<span class="item-count">x${count}</span>` : '';
        
        card.innerHTML = `
          ${countBadge}
          <img class="item-image" 
               data-icon-url="${info.icon_url}" 
               alt="${name}"
               src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='50' text-anchor='middle' dy='.3em' font-size='40'%3E⏳%3C/text%3E%3C/svg%3E">
          <div class="item-name">${name}</div>
        `;
        
        grid.appendChild(card);
        
        // 异步加载图片
        loadItemImage(card.querySelector('.item-image'), info.icon_url, token, secret);
      }
      
      // 加载玩家头像
      async function loadPlayerAvatar(avatarUrl, token, secret) {
        try {
          const response = await fetch(`${getApiBase()}/steam-player/image?url=${encodeURIComponent(avatarUrl)}&token=${encodeURIComponent(token)}`, {
            headers: { 'X-Secret': secret }
          });
          
          if (response.ok) {
            const blob = await response.blob();
            document.getElementById('playerAvatar').src = URL.createObjectURL(blob);
          }
        } catch (error) {
          console.error('加载头像失败:', error);
        }
      }
      
      // 加载物品图片
      async function loadItemImage(img, iconUrl, token, secret) {
        try {
          const response = await fetch(`${getApiBase()}/cs-inv/image?icon_url=${encodeURIComponent(iconUrl)}&token=${encodeURIComponent(token)}`, {
            headers: { 'X-Secret': secret }
          });
          
          if (response.ok) {
            const blob = await response.blob();
            img.src = URL.createObjectURL(blob);
          }
        } catch (error) {
          console.error('加载图片失败:', error);
        }
      }
    }
  </script>
</body>
</html>
